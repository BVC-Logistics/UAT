name: Salesforce JWT CI CD
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Verify Salesforce CLI
        run: sf --version

      - name: Authenticate to UAT using JWT
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --set-default

      - name: Validate deployment in UAT
        run: |
          sf project deploy start \
            --dry-run \
            --source-dir force-app \
            --test-level RunLocalTests

  deploy-uat:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Verify Salesforce CLI
        run: sf --version

      - name: Authenticate Salesforce (UAT)
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --set-default

      - name: Debug workspace
        run: |
          pwd
          ls -la
          find . -name sfdx-project.json
          find . -name "*.cls" | head -10

      - name: Deploy to UAT
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests

  deploy-prod:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Verify Salesforce CLI
        run: sf --version

      - name: Authenticate to Production using JWT
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --set-default

      - name: Deploy to Production
        run: |
          sf project deploy start \
            --source-dir force-app \
            --test-level RunLocalTests
EOF
Then also move your classes into force-app where Salesforce CLI expects them:
bash# Move classes into force-app structure
mkdir -p force-app/main/default/classes
cp classes/*.cls force-app/main/default/classes/
cp classes/*.cls-meta.xml force-app/main/default/classes/

# Verify
ls force-app/main/default/classes/ | head -5
Then commit and push:
bashgit add .
git commit -m "fix: correct yaml syntax and move classes into force-app"
git push origin main
```

---

## Why classes need to be in `force-app/`

Salesforce DX projects expect this structure:
```
force-app/
└── main/
    └── default/
        ├── classes/        ← .cls files go here
        ├── triggers/
        └── lwc/
